<!-- БЛОК 4: НАПРАВЛЕНИЯ ПРАКТИКИ (Services) с раскрывающимися услугами. Tilda: блок "Код"/T123 -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,500&family=Inter:wght@400;500&display=swap');
.qlh-srv{
  --bg:#FAFAF7;--paper:#F4F2EC;--fg:#2B2B2B;--muted:#4A4741;--bd:#E5E2D9;--sage:#3B5942;--sage-d:#2F4A36;
  --disp:'Cormorant Garamond',serif;--sans:'Inter',sans-serif;
  background:var(--bg);font-family:var(--sans);
}
.qlh-srv *{box-sizing:border-box;margin:0;padding:0}
.qlh-srv .wrap{max-width:1280px;margin:0 auto;padding:80px 1.25rem}
.qlh-srv .head{margin-bottom:48px;max-width:42rem}
.qlh-srv .kicker{font-size:11px;text-transform:uppercase;letter-spacing:.22em;color:var(--sage)}
.qlh-srv h2{margin-top:16px;font-family:var(--disp);font-weight:500;font-size:36px;line-height:1.1;color:var(--fg)}
.qlh-srv .item{border-top:1px solid var(--bd);padding:48px 0;scroll-margin-top:96px}
.qlh-srv .row{display:grid;grid-template-columns:1fr;gap:32px}
.qlh-srv .num{font-family:var(--disp);font-size:13px;color:var(--muted)}
.qlh-srv .t{margin-top:12px;font-family:var(--disp);font-weight:500;font-size:28px;line-height:1.1;color:var(--fg)}
.qlh-srv .price{margin-top:24px;display:inline-flex;align-items:baseline;gap:8px}
.qlh-srv .price .o{font-size:11px;text-transform:uppercase;letter-spacing:.18em;color:var(--muted)}
.qlh-srv .price .v{font-family:var(--disp);font-size:24px;color:var(--sage)}
.qlh-srv .desc{font-size:16px;line-height:1.65;color:var(--muted)}
.qlh-srv .acts{margin-top:32px;display:flex;flex-wrap:wrap;align-items:center;gap:16px}
.qlh-srv .cta{display:inline-flex;align-items:center;gap:8px;border-radius:9999px;background:var(--sage);padding:12px 20px;font-size:14px;font-weight:500;color:var(--bg);text-decoration:none;transition:background .2s}
.qlh-srv .cta:hover{background:var(--sage-d)}
.qlh-srv .cta svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8}
.qlh-srv .toggle{display:inline-flex;align-items:center;gap:8px;font-size:14px;color:var(--fg);background:none;border:none;cursor:pointer;transition:color .2s}
.qlh-srv .toggle:hover{color:var(--sage-d)}
.qlh-srv .toggle svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;transition:transform .3s}
.qlh-srv .toggle.on svg{transform:rotate(180deg)}
.qlh-srv .extras{overflow:hidden;max-height:0;transition:max-height .4s cubic-bezier(.22,1,.36,1)}
.qlh-srv .extras ul{margin-top:24px;display:grid;grid-template-columns:1fr;gap:8px;border-top:1px solid var(--bd);padding-top:24px;list-style:none}
.qlh-srv .extras li{display:flex;align-items:flex-start;gap:12px;border-radius:6px;background:rgba(244,242,236,.6);padding:12px 16px;font-size:14px;color:var(--muted)}
.qlh-srv .extras li::before{content:"";margin-top:8px;height:4px;width:4px;flex:0 0 auto;border-radius:9999px;background:var(--sage)}
@media(min-width:640px){.qlh-srv .extras ul{grid-template-columns:1fr 1fr}}
@media(min-width:768px){
  .qlh-srv .wrap{padding:112px 2.5rem}
  .qlh-srv h2{font-size:48px}
  .qlh-srv .item{padding:64px 0}
  .qlh-srv .row{grid-template-columns:4fr 8fr;gap:48px}
  .qlh-srv .t{font-size:36px}
  .qlh-srv .desc{font-size:17px}
}
</style>

<section class="qlh-srv">

      <div class="kicker">Направления практики</div>
      <h2>Пять ключевых направлений с фиксированной стоимостью</h2>

<script>

    {id:"alimenty",n:"02",t:"Алименты",p:"20 000 ₽",cta:"Узнать перспективы по алиментам",link:"https://wa.me/79141234567",

</script>
